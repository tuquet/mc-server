# ============================================================
#  NoFarmlandTrample v2.0.0
#  Author: hiteex
#  Supports: Minecraft 1.8 - 1.21+
# ============================================================

# ┌─────────────────────────────┐
# │       LANGUAGE SETTINGS     │
# └─────────────────────────────┘
# Available: en, ru (or any custom .yml file in /lang/ folder)
# You can create your own language file!
language: en

# ┌─────────────────────────────┐
# │    PROTECTION SETTINGS      │
# └─────────────────────────────┘
protection:
  # Master switch - enable or disable ALL protection
  enabled: true

  # Prevent PLAYERS from trampling farmland
  prevent-players: true

  # Prevent MOBS (zombies, villagers, etc.) from trampling farmland
  prevent-mobs: true

  # Prevent ALL entities (items, falling blocks, etc.)
  prevent-all-entities: true

  # Allow players with 'nofarmtrample.bypass' permission to trample
  bypass-with-permission: true

  # Warn-only mode: players will be warned but CAN still trample
  # Useful for monitoring before enabling full protection
  warn-only-mode: false

# ┌─────────────────────────────┐
# │   NOTIFICATION SETTINGS     │
# └─────────────────────────────┘
notifications:
  # Send a message to the player when they try to trample
  notify-player: true

  # Use ActionBar instead of chat message (looks cleaner)
  # Works on 1.8+ via NMS reflection
  use-actionbar: false

  # Cooldown between messages in milliseconds (prevents chat spam)
  # 3000 = 3 seconds
  message-cooldown-ms: 3000

  # Log trampling attempts to server console
  log-to-console: false

  # Sound settings
  sound:
    # Play a sound when player tries to trample
    enabled: true

    # Sound name (version-dependent, plugin will try alternatives)
    # 1.8: NOTE_BASS, NOTE_PLING, VILLAGER_NO
    # 1.9+: BLOCK_NOTE_BASS, BLOCK_NOTE_PLING, ENTITY_VILLAGER_NO
    # 1.13+: BLOCK_NOTE_BLOCK_BASS, BLOCK_NOTE_BLOCK_PLING
    name: NOTE_BASS

    # Volume (0.0 - 1.0)
    volume: 1.0

    # Pitch (0.5 - 2.0)
    pitch: 0.5

# ┌─────────────────────────────┐
# │    CROP PROTECTION          │
# └─────────────────────────────┘
# Extra feature: prevent breaking of crops that are not fully grown
crop-protection:
  # Enable crop protection (prevents breaking unripe crops)
  enabled: false

  # Also protect nether wart from being broken when not fully grown
  protect-nether-wart: false

  # Also protect beetroot from being broken when not fully grown
  protect-beetroot: false

# ┌─────────────────────────────┐
# │    PER-WORLD SETTINGS       │
# └─────────────────────────────┘
per-world:
  # Enable per-world protection (if false, protection is GLOBAL for all worlds)
  enabled: false

  # Mode: "whitelist" or "blacklist"
  # whitelist = ONLY protect worlds listed below
  # blacklist = protect ALL worlds EXCEPT listed below
  mode: whitelist

  # List of worlds
  worlds:
    - world
    - world_nether
    - world_the_end

# ┌─────────────────────────────┐
# │     IGNORED PLAYERS         │
# └─────────────────────────────┘
# These players can always trample farmland (by username)
# Alternative to giving bypass permission
ignored-players:
# - Notch
# - jeb_

# ┌─────────────────────────────┐
# │      STATISTICS             │
# └─────────────────────────────┘
statistics:
  # Enable tracking of trampling attempts
  enabled: true

  # Maximum number of players shown in /nft top
  top-players-limit: 10